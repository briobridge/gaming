<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameCRM Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0d1220;--bg3:#111827;--bg4:#162030;
  --accent:#00e5ff;--accent2:#a855f7;--accent3:#10b981;--warn:#f59e0b;--danger:#f43f5e;
  --text:#e8edf5;--text2:#8899aa;--text3:#4a5568;
  --border:#1e3050;--border2:#243a58;--border3:#2d4a6e;
  --card:#0d1220;--inp:#080c14;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}
.btn{border:none;cursor:pointer;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;font-family:var(--font);letter-spacing:.3px;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{opacity:.85}
.btn-purple{background:var(--accent2);color:#fff}.btn-purple:hover{opacity:.85}
.btn-success{background:var(--accent3);color:#000}.btn-success:hover{opacity:.85}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.85}
.btn-warn{background:var(--warn);color:#000}.btn-warn:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border3);color:var(--text2)}.btn-ghost:hover{background:var(--bg4);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:11px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono)}
.bd-cyan{background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.2)}
.bd-purple{background:rgba(168,85,247,.1);color:var(--accent2);border:1px solid rgba(168,85,247,.2)}
.bd-green{background:rgba(16,185,129,.1);color:var(--accent3);border:1px solid rgba(16,185,129,.2)}
.bd-red{background:rgba(244,63,94,.1);color:var(--danger);border:1px solid rgba(244,63,94,.2)}
.bd-warn{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.bd-gray{background:rgba(100,120,150,.1);color:var(--text2);border:1px solid rgba(100,120,150,.2)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50}
.logo{font-size:16px;font-weight:800;color:var(--accent);letter-spacing:2px;font-family:var(--mono)}.logo em{color:var(--accent2);font-style:normal}
.nav-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);background:transparent;border:none;transition:all .15s;font-family:var(--font)}
.nav-btn:hover{color:var(--text);background:var(--bg3)}.nav-btn.active{color:var(--accent);background:rgba(0,229,255,.08)}
.clock-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;font-family:var(--mono);color:var(--text2)}
.clock-pill strong{color:var(--accent3)}
.kpi-bar{display:grid;gap:12px;padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.kpi-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-weight:600}
.kpi-value{font-size:20px;font-weight:700;font-family:var(--mono)}.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px}
.tabs-row{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;overflow-x:auto}
.tab-item{padding:12px 16px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab-item:hover{color:var(--text)}.tab-item.active{color:var(--accent);border-bottom-color:var(--accent)}
.content-scroll{flex:1;overflow-y:auto;padding:20px}
.content-inner{max-width:1300px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.fc{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.fc-head{background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px}
.fc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.fc-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2)}
.fg{padding:14px 16px;display:grid;gap:10px}
.c2{grid-template-columns:repeat(2,1fr)}.c3{grid-template-columns:repeat(3,1fr)}.c4{grid-template-columns:repeat(4,1fr)}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.field label .req{color:var(--danger);margin-left:2px}
.field input,.field select,.field textarea{background:var(--inp);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;width:100%;font-family:var(--font);transition:border .15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field input.ok{border-color:var(--accent3)!important}.field input.er{border-color:var(--danger)!important}
.field select option{background:var(--bg2)}
.hint{font-size:10px;margin-top:2px}.hint-ok{color:var(--accent3)}.hint-er{color:var(--danger)}
.tog-row{display:flex;gap:6px}
.tog{flex:1;padding:7px;border:1px solid var(--border2);border-radius:7px;background:var(--inp);color:var(--text2);cursor:pointer;font-size:12px;text-align:center;transition:all .15s}
.tog.t-yes{border-color:var(--accent3);background:rgba(16,185,129,.1);color:var(--accent3)}
.tog.t-no{border-color:var(--danger);background:rgba(244,63,94,.1);color:var(--danger)}
.sub-bar{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg3)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:400px}
th{background:var(--bg3);padding:8px 12px;text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:700}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.abtns{display:flex;gap:4px}
.ibtn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:3px 8px;display:inline-flex;align-items:center;cursor:pointer;color:var(--text3);font-size:11px;transition:all .15s;white-space:nowrap}
.ibtn:hover{background:var(--bg3);color:var(--text)}.ibtn.del:hover{border-color:var(--danger);color:var(--danger)}
.ibtn.rl:hover{border-color:var(--accent3);color:var(--accent3)}
.ibtn.wb:hover{border-color:var(--warn);color:var(--warn)}
.empty-row{padding:32px;text-align:center;color:var(--text3);font-size:12px}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border3);border-radius:14px;width:720px;max-width:100%;overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.modal-sm{width:480px}
.mhead{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mtitle{font-size:15px;font-weight:700}.msub{font-size:11px;color:var(--text3);margin-top:2px}
.mclose{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:4px}
.mbody{overflow-y:auto;flex:1}.mfooter{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg3);flex-shrink:0}
.gbal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:16px}
.gbal-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px}
.gbal-name{font-size:13px;font-weight:700;margin-bottom:10px}
.gbal-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.gbal-current{font-size:22px;font-weight:700;margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.admin-layout{display:flex;flex:1;overflow:hidden}
.admin-sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.asb-sec{padding:12px 14px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.asb-item{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;cursor:pointer;color:var(--text3);border-left:2px solid transparent;transition:all .15s}
.asb-item:hover{color:var(--text);background:var(--bg3)}.asb-item.active{color:var(--accent);background:rgba(0,229,255,.06);border-left-color:var(--accent)}
.admin-main{flex:1;overflow-y:auto;padding:20px}
.akpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
.filter-bar input,.filter-bar select{background:var(--inp);border:1px solid var(--border2);border-radius:7px;padding:5px 10px;color:var(--text);font-size:12px;font-family:var(--font)}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--accent)}
.exp-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
.info-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:12px}
.ib-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ib-item .ibl{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.ib-item .ibv{font-weight:600;font-size:13px}
.desc-note{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:11px;color:var(--text2);line-height:1.6}
.closed-screen{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:20px;padding:40px}
.shift-report{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:500px}
.sr-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.sr-row:last-child{border-bottom:none;font-weight:700}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.perm-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;font-size:12px;cursor:pointer;user-select:none}
.perm-item.on{border-color:var(--accent3);background:rgba(16,185,129,.07)}
.perm-cb{width:14px;height:14px;border-radius:3px;border:1px solid var(--border3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.perm-item.on .perm-cb{background:var(--accent3);border-color:var(--accent3);color:#000}
@media(max-width:900px){.c3,.c4{grid-template-columns:repeat(2,1fr)}.admin-sidebar{width:160px}}
@media(max-width:600px){.c2,.c3,.c4{grid-template-columns:1fr}.admin-sidebar{width:130px}}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function today(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'-'+MONTHS[d.getMonth()]+'-'+d.getFullYear();}
function fmtTime(d){return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function fmtHM(d){return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function isUrl(u){try{new URL(u);return true;}catch(e){return false;}}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function getShift(){var h=new Date().getHours();return h>=6&&h<14?'Morning':h>=14&&h<22?'Afternoon':'Night';}
function fmt$(n){return '$'+parseFloat(n||0).toFixed(2);}
function dl(content,mime,filename){var b=new Blob([content],{type:mime});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=filename;a.click();}

var PERM_LIST=[
  {id:'view_entries',label:'View Entries'},{id:'add_paid',label:'Add Paid Recharge'},
  {id:'add_freeplay',label:'Add Freeplay'},{id:'add_redeem',label:'Add Redeem'},
  {id:'edit_entries',label:'Edit Entries'},{id:'delete_entries',label:'Delete Entries'},
  {id:'view_dashboard',label:'View Dashboard'},{id:'view_games',label:'View Games'},
  {id:'view_vendors',label:'View Vendors'},{id:'view_expenses',label:'View Expenses'},
  {id:'add_expenses',label:'Add Expenses'},{id:'export_data',label:'Export / Backup'},
  {id:'manage_agents',label:'Manage Agents'},{id:'manage_settings',label:'Manage Settings'},
  {id:'close_shift',label:'Close Shift'},
];
var ROLE_DEF={
  owner:PERM_LIST.map(function(p){return p.id;}),
  admin:PERM_LIST.map(function(p){return p.id;}),
  manager:['view_entries','add_paid','add_freeplay','add_redeem','edit_entries','view_dashboard','view_games','view_vendors','view_expenses','add_expenses','export_data','close_shift'],
  supervisor:['view_entries','add_paid','add_freeplay','add_redeem','view_dashboard','view_games','view_expenses','close_shift'],
  agent:['view_entries','add_paid','add_freeplay','add_redeem'],
};

var STORE='gcrmv5';
function loadDB(){try{var s=localStorage.getItem(STORE);if(s)return JSON.parse(s);}catch(e){}return null;}
function saveDB(){try{localStorage.setItem(STORE,JSON.stringify(DB));}catch(e){}}

var DEF={
  shifts:[{id:'s1',name:'Morning',start:'06:00',end:'14:00'},{id:'s2',name:'Afternoon',start:'14:00',end:'22:00'},{id:'s3',name:'Night',start:'22:00',end:'06:00'}],
  agents:[{id:'a1',name:'Ali Hassan',role:'Agent'},{id:'a2',name:'Sara Ahmed',role:'Agent'},{id:'a3',name:'Usman Malik',role:'Senior Agent'}],
  staff:[],
  payMethods:[
    {id:'pm1',name:'Cash App',tags:[{id:'t1',tag:'$CashTag1'}]},
    {id:'pm2',name:'Zelle',tags:[{id:'t2',tag:'zelle@shop.com'}]},
    {id:'pm3',name:'Venmo',tags:[{id:'t3',tag:'@VenmoHandle'}]},
  ],
  pageNames:[{id:'pn1',name:'Main Page'},{id:'pn2',name:'VIP Page'}],
  games:[
    {id:'g1',name:'Fish Table',backendLoaded:5000,pricePer1k:10,backendLink:'',playerLink:'',username:'',password:'',vendorId:'',reloadHistory:[]},
    {id:'g2',name:'Juwa',backendLoaded:8000,pricePer1k:10,backendLink:'',playerLink:'',username:'',password:'',vendorId:'',reloadHistory:[]},
    {id:'g3',name:'Orion Stars',backendLoaded:6000,pricePer1k:10,backendLink:'',playerLink:'',username:'',password:'',vendorId:'',reloadHistory:[]},
  ],
  vendors:[{id:'v1',name:'FastPay Co',payMethodId:'',gatewayFee:2.5,payTag:'$FastPay',notes:''}],
  expCats:[{id:'ec1',name:'Payroll'},{id:'ec2',name:'Rent'},{id:'ec3',name:'Utilities'},{id:'ec4',name:'Marketing'},{id:'ec5',name:'Misc'}],
  expenses:[],entries:[],closedShifts:[],attendance:[],
  shiftStart:new Date().toISOString(),
  supabase:{url:'https://eioindyucvbkvybbevmc.supabase.co',anonKey:'sb_publishable_VPBm_1F6jl7dBMHJi1jokA_UOdcW6jZ',enabled:true},
};

var DB=loadDB()||JSON.parse(JSON.stringify(DEF));
if(!DB.staff)DB.staff=[];
if(!DB.closedShifts)DB.closedShifts=[];
if(!DB.attendance)DB.attendance=[];
if(!DB.supabase)DB.supabase={url:'https://eioindyucvbkvybbevmc.supabase.co',anonKey:'sb_publishable_VPBm_1F6jl7dBMHJi1jokA_UOdcW6jZ',enabled:true};
if(!DB.supabase.url)DB.supabase={url:'https://eioindyucvbkvybbevmc.supabase.co',anonKey:'sb_publishable_VPBm_1F6jl7dBMHJi1jokA_UOdcW6jZ',enabled:true};
if(!DB.expenses)DB.expenses=[];
if(!DB.expCats)DB.expCats=DEF.expCats;
DB.games.forEach(function(g){if(!g.vendorId)g.vendorId='';if(!g.reloadHistory)g.reloadHistory=[];});
DB.vendors.forEach(function(v){if(v.commission!==undefined&&v.gatewayFee===undefined){v.gatewayFee=v.commission;delete v.commission;}if(v.gatewayFee===undefined)v.gatewayFee=0;});

function gameBal(gid){
  var g=DB.games.find(function(x){return x.id===gid;});if(!g)return 0;
  var start=parseFloat(g.backendLoaded||0);
  var used=DB.entries.filter(function(e){return e.type==='paid'&&e.gameId===gid;}).reduce(function(s,e){return s+parseFloat(e.recharge||0);},0);
  var back=DB.entries.filter(function(e){return e.type==='redeem'&&e.gameId===gid;}).reduce(function(s,e){return s+parseFloat(e.rdCredits||0);},0);
  return start-used+back;
}
function tagsFor(mid){var m=DB.payMethods.find(function(x){return x.id===mid;});return m?m.tags:[];}
function agentNames(){return DB.agents.map(function(a){return a.name;});}
function shiftNames(){return DB.shifts.map(function(s){return s.name;});}
function gameNames(){return DB.games.map(function(g){return g.name;});}
function pageNames(){return DB.pageNames.map(function(p){return p.name;});}
function shiftKPIs(){
  var e=DB.entries;
  var paid=e.filter(function(x){return x.type==='paid';});
  var fp=e.filter(function(x){return x.type==='freeplay';});
  var rd=e.filter(function(x){return x.type==='redeem';});
  return{paidCount:paid.length,fpCount:fp.length,rdCount:rd.length,
    totalR:paid.reduce(function(s,x){return s+parseFloat(x.recharge||0);},0),
    totalFP:fp.reduce(function(s,x){return s+parseFloat(x.fpAmount||0);},0),
    totalCashout:rd.reduce(function(s,x){return s+parseFloat(x.cashoutPaid||0);},0),
    newPlayers:e.filter(function(x){return x.isNewPlayer;}).length,
    totalDeposit:paid.reduce(function(s,x){return s+parseFloat(x.deposit||0);},0),
  };
}

var S={
  page:'shift',shiftTab:'paid',eFilter:'all',
  adminSection:'dashboard',modal:null,editGameId:null,
  txSearch:'',txType:'all',txAgent:'',txGame:'',txShift:'',txDate:'',txSort:'date_desc',
  afAgent:'',afDate:'',afStatus:'',
  pfDate:'',pfShift:'',
  pf:newPF(),ff:newFF(),rf:newRF(),
};
function newPF(){return{date:today(),shift:getShift(),agent:'',playerName:'',playerUrl:'',deposit:'',recharge:'',promo:'',promoP:'',payMethodId:'',payTagId:'',custTag:'',gameId:'',gameName:'',depositOnPage:'',pageName:'',huntingProfile:'',salesName:'',legalName:'',contact:'',email:''};}
function newFF(){return{date:today(),shift:getShift(),agent:'',playerName:'',playerUrl:'',fpAmount:'',gameId:'',gameName:'',salesName:'',legalName:'',contact:'',email:''};}
function newRF(){return{date:today(),shift:getShift(),agent:'',gameId:'',gameName:'',rdCredits:'',cashoutPaid:''};}

function render(){
  var root=document.getElementById('root');
  var as=document.querySelector('.admin-main');var asc=as?as.scrollTop:0;
  root.innerHTML=buildApp();
  bindAll();
  if(window._clk)clearInterval(window._clk);
  window._clk=setInterval(function(){var el=document.getElementById('clk');if(el)el.textContent=fmtTime(new Date());},1000);
  var as2=document.querySelector('.admin-main');if(as2&&asc)as2.scrollTop=asc;
}

function buildApp(){
  if(S.page==='closed')return buildClosed();
  return '<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">'+buildTopbar()+(S.page==='shift'?buildShift():buildAdmin())+(S.modal?buildModal():'')+'</div>';
}

function buildTopbar(){
  return '<div class="topbar">'+
    '<div class="logo">GAME<em>CRM</em></div>'+
    '<div style="display:flex;gap:4px">'+
      '<button class="nav-btn'+(S.page==='shift'?' active':'')+'" data-nav="shift">Agent Panel</button>'+
      '<button class="nav-btn'+(S.page==='admin'?' active':'')+'" data-nav="admin">Admin Dashboard</button>'+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:8px">'+
      '<div class="clock-pill"><strong>'+getShift()+'</strong>&nbsp;<span id="clk">'+fmtTime(new Date())+'</span></div>'+
      (S.page==='shift'?'<button class="btn btn-danger btn-sm" id="btn-close-shift">&#x2297; Close Shift</button>':'')+
    '</div>'+
  '</div>';
}

/* ───── SHIFT APP ───── */
function buildShift(){
  var k=shiftKPIs();
  var body='';
  if(S.shiftTab==='paid')body=buildPaidForm()+buildEntriesTable();
  else if(S.shiftTab==='fp')body=buildFpForm()+buildEntriesTable();
  else if(S.shiftTab==='rd')body=buildRdForm()+buildEntriesTable();
  else if(S.shiftTab==='bal')body=buildBalView();
  else if(S.shiftTab==='att')body=buildAgentAtt();
  var tabs=[['paid','Paid Recharge'],['fp','Freeplay'],['rd','Redeem/Cashout'],['bal','Game Balance'],['att','Attendance']];
  return '<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">'+
    '<div class="kpi-bar" style="grid-template-columns:repeat(5,1fr)">'+
      kCard('Paid Recharges',k.paidCount,fmt$(k.totalR)+' total','var(--accent)')+
      kCard('Freeplay',k.fpCount,fmt$(k.totalFP)+' given','var(--accent2)')+
      kCard('Cashouts',k.rdCount,fmt$(k.totalCashout)+' paid','var(--danger)')+
      kCard('Total Deposit',fmt$(k.totalDeposit),'cash in','var(--accent3)')+
      kCard('New Players',k.newPlayers,'this shift','var(--warn)')+
    '</div>'+
    '<div class="tabs-row">'+tabs.map(function(t){return '<div class="tab-item'+(S.shiftTab===t[0]?' active':'')+'" data-stab="'+t[0]+'">'+t[1]+'</div>';}).join('')+'</div>'+
    '<div class="content-scroll"><div class="content-inner">'+body+'</div></div>'+
  '</div>';
}
function kCard(l,v,s,c){return '<div class="kpi-card"><div class="kpi-label">'+l+'</div><div class="kpi-value" style="color:'+c+'">'+v+'</div><div class="kpi-sub">'+s+'</div></div>';}

/* ───── FORM HELPERS ───── */
function fld(label,req,html,hint){
  var r=req?'<span class="req">*</span>':'';
  var h=hint?('<div class="hint '+(hint.charAt(0)==='✓'?'hint-ok':'hint-er')+'">'+hint+'</div>'):'';
  return '<div class="field"><label>'+esc(label)+r+'</label>'+html+h+'</div>';
}
function inp(id,val,ph,type,cls){
  type=type||'text';
  return '<input type="'+type+'" id="'+id+'" value="'+esc(val)+'" placeholder="'+esc(ph)+'"'+(cls?' class="'+cls+'"':'')+' autocomplete="off">';
}
function numinp(id,val,ph){return '<input type="number" id="'+id+'" value="'+esc(val)+'" placeholder="'+esc(ph)+'" step="0.01" min="0" autocomplete="off">';}
function sel(id,val,opts,ph){
  ph=ph||'-- Select --';
  var o='<option value="">'+esc(ph)+'</option>';
  opts.forEach(function(x){var v=typeof x==='string'?x:x.value;var l=typeof x==='string'?x:x.label;o+='<option value="'+esc(v)+'"'+(v===val?' selected':'')+'>'+esc(l)+'</option>';});
  return '<select id="'+id+'">'+o+'</select>';
}
function gOpts(arr){return arr.map(function(n){return{value:n,label:n};});}
function fcHead(title,color){return '<div class="fc-head"><div class="fc-dot" style="background:'+color+'"></div><div class="fc-title">'+esc(title)+'</div></div>';}
function inpStyle(w){return 'style="background:var(--inp);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;width:'+w+'" autocomplete="off"';}
function roInputSt(){return 'style="background:var(--inp);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;width:100%;opacity:.55;font-family:var(--font)"';}

/* ───── GAME BALANCE ───── */
function buildBalView(){
  if(!DB.games.length)return '<div class="fc"><div class="empty-row">No games configured.</div></div>';
  var cards=DB.games.map(function(g){
    var start=parseFloat(g.backendLoaded||0);
    var used=DB.entries.filter(function(e){return e.type==='paid'&&e.gameName===g.name;}).reduce(function(s,e){return s+parseFloat(e.recharge||0);},0);
    var cur=gameBal(g.id);
    return '<div class="gbal-card">'+
      '<div class="gbal-name">'+esc(g.name)+'</div>'+
      '<div class="gbal-row"><span>Starting</span><span>'+fmt$(start)+'</span></div>'+
      '<div class="gbal-row"><span>Recharged</span><span style="color:var(--danger)">-'+fmt$(used)+'</span></div>'+
      '<div class="gbal-current" style="color:'+(cur<0?'var(--danger)':'var(--accent3)')+'">'+fmt$(cur)+'</div>'+
    '</div>';
  }).join('');
  return '<div class="fc">'+fcHead('Live Game Balances','var(--accent3)')+'<div class="gbal-grid">'+cards+'</div></div>';
}

/* ───── ENTRIES TABLE ───── */
function buildEntriesTable(){
  var list=DB.entries.slice();
  if(S.eFilter==='paid')list=list.filter(function(e){return e.type==='paid';});
  else if(S.eFilter==='freeplay')list=list.filter(function(e){return e.type==='freeplay';});
  else if(S.eFilter==='redeem')list=list.filter(function(e){return e.type==='redeem';});
  var fBtns=['all','paid','freeplay','redeem'].map(function(f){return '<button class="btn btn-xs'+(S.eFilter===f?' btn-primary':' btn-ghost')+'" data-ef="'+f+'">'+f.charAt(0).toUpperCase()+f.slice(1)+'</button>';}).join('');
  var rows=!list.length?'<tr><td colspan="10" class="empty-row">No entries yet.</td></tr>':
    list.map(function(e,i){
      var tb='<span class="badge '+(e.type==='paid'?'bd-cyan':e.type==='freeplay'?'bd-purple':'bd-red')+'">'+(e.type==='paid'?'Paid':e.type==='freeplay'?'Free':'Redeem')+'</span>';
      var nb=e.isNewPlayer?'<span class="badge bd-green" style="margin-left:4px">New</span>':'';
      var dep=e.deposit?fmt$(e.deposit):'—';
      var amt=e.recharge?fmt$(e.recharge):e.fpAmount?('<span style="color:var(--accent2)">'+fmt$(e.fpAmount)+'</span>'):e.rdCredits?('<span style="color:var(--danger)">-'+fmt$(e.rdCredits)+'</span>'):'—';
      return '<tr>'+
        '<td style="color:var(--text3);font-family:var(--mono)">'+(i+1)+'</td>'+
        '<td>'+tb+nb+'</td>'+
        '<td style="font-size:11px">'+esc(e.date||'—')+'</td>'+
        '<td>'+esc(e.agent||'—')+'</td>'+
        '<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.playerName||'—')+'</td>'+
        '<td style="font-family:var(--mono);font-size:11px">'+esc(e.gameId||'—')+'</td>'+
        '<td>'+esc(e.gameName||'—')+'</td>'+
        '<td style="color:var(--accent3)">'+dep+'</td>'+
        '<td>'+amt+'</td>'+
        '<td><div class="abtns"><button class="ibtn" data-edit-entry="'+e.id+'">Edit</button><button class="ibtn del" data-del-entry="'+e.id+'">Del</button></div></td>'+
      '</tr>';
    }).join('');
  return '<div class="fc">'+
    '<div class="fc-head" style="justify-content:space-between;padding-right:8px"><div style="display:flex;align-items:center;gap:8px"><div class="fc-dot"></div><div class="fc-title">Shift Entries ('+list.length+')</div></div><div style="display:flex;gap:4px">'+fBtns+'</div></div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>#</th><th>Type</th><th>Date</th><th>Agent</th><th>Player</th><th>Game ID</th><th>Game</th><th>Deposit</th><th>Amount</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
  '</div>';
}

/* ───── AGENT ATTENDANCE ───── */
function buildAgentAtt(){
  var td=today();
  var people=allPeople();
  var cards=people.length===0?'<div class="empty-row">No agents configured.</div>':
    people.map(function(a){
      var rec=DB.attendance.find(function(r){return r.agentId===a.id&&r.date===td;});
      var isIn=rec&&rec.checkIn&&!rec.checkOut&&rec.status!=='leave';
      var isOut=rec&&rec.checkOut;
      var isLeave=rec&&rec.status==='leave';
      var dur='';
      if(isIn&&rec.checkInAt){var m=Math.floor((Date.now()-new Date(rec.checkInAt).getTime())/60000);dur=Math.floor(m/60)+'h '+m%60+'m on shift';}
      else if(isOut&&rec.duration){dur=Math.floor(rec.duration/60)+'h '+rec.duration%60+'m worked';}
      var bc=isIn?'var(--accent3)':isLeave?'var(--warn)':isOut?'var(--border3)':'var(--border)';
      var icon=isIn?'🟢':isLeave?'🟡':isOut?'⚫':'⚪';
      var btns='';
      if(!rec||(!rec.checkIn&&!isLeave))btns='<button class="btn btn-success btn-xs" data-checkin="'+a.id+'">✓ Check In</button> <button class="btn btn-warn btn-xs" data-leave="'+a.id+'">Leave</button>';
      else if(isIn)btns='<button class="btn btn-danger btn-xs" data-checkout="'+a.id+'">Check Out</button>';
      else if(isOut)btns='<span class="badge bd-gray">Done today</span>';
      else if(isLeave)btns='<span class="badge bd-warn">On Leave</span>';
      var ti=rec&&rec.checkIn?'In: '+rec.checkIn+(rec.checkOut?' · Out: '+rec.checkOut:''):'';
      var li=isLeave?('<div style="font-size:11px;color:var(--warn)">Leave: '+esc(rec.leaveReason||'')+'</div>'):'';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg3);border:1px solid '+bc+';border-radius:10px;margin-bottom:8px">'+
        '<div style="display:flex;align-items:center;gap:12px">'+
          '<div style="font-size:20px">'+icon+'</div>'+
          '<div>'+
            '<div style="font-weight:600">'+esc(a.name)+'</div>'+
            '<div style="font-size:11px;color:var(--text3)">'+esc(a.role||'Agent')+(dur?' · <span style="color:'+(isIn?'var(--accent3)':'var(--text2)')+'">'+dur+'</span>':'')+'</div>'+
            (ti?'<div style="font-size:10px;color:var(--text3)">'+ti+'</div>':'')+li+
          '</div>'+
        '</div>'+
        '<div style="display:flex;gap:6px">'+btns+'</div>'+
      '</div>';
    }).join('');
  var tr=DB.attendance.filter(function(r){return r.date===td;});
  var cIn=tr.filter(function(r){return r.checkIn&&!r.checkOut&&r.status!=='leave';}).length;
  var cOut=tr.filter(function(r){return r.checkOut;}).length;
  var cLv=tr.filter(function(r){return r.status==='leave';}).length;
  var cAb=Math.max(0,people.length-cIn-cOut-cLv);
  return '<div class="fc">'+fcHead('Attendance — '+td,'var(--accent3)')+'<div style="padding:14px 16px">'+cards+'</div></div>'+
    '<div class="fc">'+fcHead("Today's Summary",'var(--accent2)')+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px 16px">'+
      kCard('Currently In',cIn,'checked in','var(--accent3)')+kCard('Checked Out',cOut,'completed','var(--text2)')+kCard('On Leave',cLv,'approved','var(--warn)')+kCard('Not Arrived',cAb,'absent','var(--danger)')+
    '</div></div>';
}
function allPeople(){
  var p=DB.agents.slice();
  DB.staff.forEach(function(m){if(!p.find(function(a){return a.name===m.name;}))p.push(m);});
  return p;
}

/* ───── DASHBOARD ───── */
function buildDash(){
  var allE=DB.entries.slice();
  DB.closedShifts.forEach(function(sh){(sh.entries||[]).forEach(function(e){allE.push(e);});});
  var paid=allE.filter(function(x){return x.type==='paid';});
  var fp=allE.filter(function(x){return x.type==='freeplay';});
  var rd=allE.filter(function(x){return x.type==='redeem';});
  var tDep=paid.reduce(function(s,x){return s+parseFloat(x.deposit||0);},0);
  var tRec=paid.reduce(function(s,x){return s+parseFloat(x.recharge||0);},0);
  var tFP=fp.reduce(function(s,x){return s+parseFloat(x.fpAmount||0);},0);
  var tCash=rd.reduce(function(s,x){return s+parseFloat(x.cashoutPaid||0);},0);
  var tExp=DB.expenses.reduce(function(s,x){return s+parseFloat(x.amount||0);},0);
  var newP=allE.filter(function(x){return x.isNewPlayer;}).length;
  var ck=shiftKPIs();
  var vRows=DB.vendors.map(function(v){
    var vE=paid.filter(function(x){return x.vendorId===v.id;});
    var dep=vE.reduce(function(s,x){return s+parseFloat(x.deposit||0);},0);
    var fee=dep*(parseFloat(v.gatewayFee||0)/100);

  return '<h2 style="font-size:18px;font-weight:800;margin-bottom:4px">Admin Dashboard</h2>'+
    '<div style="font-size:12px;color:var(--text3);margin-bottom:16px">'+today()+' · '+DB.closedShifts.length+' closed shifts</div>'+
    '<div style="background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap">'+
      '<span style="font-size:11px;color:var(--text3);font-weight:700;align-self:center">Current Shift →</span>'+
      '<span style="font-size:12px"><span style="color:var(--text3)">Paid:</span> <strong style="color:var(--accent)">'+ck.paidCount+'</strong></span>'+
      '<span style="font-size:12px"><span style="color:var(--text3)">Deposit:</span> <strong style="color:var(--accent3)">'+fmt$(ck.totalDeposit)+'</strong></span>'+
      '<span style="font-size:12px"><span style="color:var(--text3)">Recharge:</span> <strong style="color:var(--accent)">'+fmt$(ck.totalR)+'</strong></span>'+
      '<span style="font-size:12px"><span style="color:var(--text3)">Cashout:</span> <strong style="color:var(--danger)">'+fmt$(ck.totalCashout)+'</strong></span>'+
      '<span style="font-size:12px"><span style="color:var(--text3)">FP:</span> <strong style="color:var(--accent2)">'+fmt$(ck.totalFP)+'</strong></span>'+
    '</div>'+
    '<div class="akpi">'+
      kCard('All-Time Recharges',fmt$(tRec),paid.length+' txns','var(--accent)')+
      kCard('All-Time Deposit',fmt$(tDep),'cash collected','var(--accent3)')+
      kCard('Total Freeplay',fmt$(tFP),fp.length+' entries','var(--accent2)')+
      kCard('Cashouts Paid',fmt$(tCash),rd.length+' redeems','var(--danger)')+
      kCard('New Players',newP,'all time','var(--warn)')+
      kCard('Total Expenses',fmt$(tExp),DB.expenses.length+' items','var(--text2)')+
      kCard('Active Games',DB.games.length,'configured','var(--accent)')+
      kCard('Closed Shifts',DB.closedShifts.length,'archived','var(--text2)')+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">'+
      '<div class="fc">'+fcHead('Game Balances','var(--accent3)')+'<div class="tbl-wrap"><table><thead><tr><th>Game</th><th>Start</th><th>Current</th></tr></thead><tbody>'+gRows+'</tbody></table></div></div>'+
      '<div class="fc">'+fcHead('Vendor Net After Fee','var(--warn)')+'<div class="tbl-wrap"><table><thead><tr><th>Vendor</th><th>Total</th><th>Fee</th><th>Net</th></tr></thead><tbody>'+vRows+'</tbody></table></div></div>'+
    '</div>'+
    '<div class="fc">'+fcHead('Recent Expenses','var(--danger)')+'<div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th></tr></thead><tbody>'+rExp+'</tbody></table></div></div>';
}

/* ───── TRANSACTIONS ───── */
function buildTx(){
  var allE=DB.entries.map(function(e){return Object.assign({},e,{shiftLabel:'Current'});});
  DB.closedShifts.forEach(function(sh){(sh.entries||[]).forEach(function(e){allE.push(Object.assign({},e,{shiftLabel:sh.label||sh.date||'Closed'}));});});
  var q=(S.txSearch||'').toLowerCase();
  if(q)allE=allE.filter(function(e){return[e.playerName,e.agent,e.gameId,e.gameName,e.custTag,e.legalName].some(function(v){return(v||'').toLowerCase().indexOf(q)>=0;});});
  if(S.txType&&S.txType!=='all')allE=allE.filter(function(e){return e.type===S.txType;});
  if(S.txAgent)allE=allE.filter(function(e){return e.agent===S.txAgent;});
  if(S.txGame)allE=allE.filter(function(e){return e.gameName===S.txGame;});
  if(S.txShift)allE=allE.filter(function(e){return e.shift===S.txShift;});
  if(S.txDate)allE=allE.filter(function(e){return(e.date||'').indexOf(S.txDate)>=0;});
  var sortMap={date_desc:function(a,b){return b.id.localeCompare(a.id);},date_asc:function(a,b){return a.id.localeCompare(b.id);},deposit_desc:function(a,b){return parseFloat(b.deposit||0)-parseFloat(a.deposit||0);},deposit_asc:function(a,b){return parseFloat(a.deposit||0)-parseFloat(b.deposit||0);},player_asc:function(a,b){return(a.playerName||'').localeCompare(b.playerName||'');},agent_asc:function(a,b){return(a.agent||'').localeCompare(b.agent||'');},};
  allE.sort(sortMap[S.txSort]||sortMap.date_desc);
  var tD=allE.filter(function(e){return e.type==='paid';}).reduce(function(s,e){return s+parseFloat(e.deposit||0);},0);
  var tR=allE.filter(function(e){return e.type==='paid';}).reduce(function(s,e){return s+parseFloat(e.recharge||0);},0);
  var tC=allE.filter(function(e){return e.type==='redeem';}).reduce(function(s,e){return s+parseFloat(e.cashoutPaid||0);},0);
  var aOpts=agentNames().map(function(n){return '<option value="'+esc(n)+'"'+(S.txAgent===n?' selected':'')+'>'+esc(n)+'</option>';}).join('');
  var gOpts2=gameNames().map(function(n){return '<option value="'+esc(n)+'"'+(S.txGame===n?' selected':'')+'>'+esc(n)+'</option>';}).join('');
  var sOpts=shiftNames().map(function(n){return '<option value="'+esc(n)+'"'+(S.txShift===n?' selected':'')+'>'+esc(n)+'</option>';}).join('');
  var rows=!allE.length?'<tr><td colspan="11" class="empty-row">No transactions match filters.</td></tr>':
    allE.map(function(e,i){
      var amt=e.recharge?fmt$(e.recharge):e.fpAmount?('<span style="color:var(--accent2)">'+fmt$(e.fpAmount)+'</span>'):e.rdCredits?('<span style="color:var(--danger)">-'+fmt$(e.rdCredits)+'</span>'):'—';
      return '<tr>'+
        '<td style="color:var(--text3);font-family:var(--mono);font-size:11px">'+(i+1)+'</td>'+
        '<td><span class="badge '+(e.type==='paid'?'bd-cyan':e.type==='freeplay'?'bd-purple':'bd-red')+'">'+(e.type==='paid'?'Paid':e.type==='freeplay'?'Free':'Redeem')+'</span></td>'+
        '<td style="font-size:11px;color:var(--text3)">'+esc(e.shiftLabel)+'</td>'+
        '<td style="font-size:11px;white-space:nowrap">'+esc(e.date||'—')+'</td>'+
        '<td>'+esc(e.agent||'—')+'</td>'+
        '<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.playerName||'—')+'</td>'+
        '<td style="font-family:var(--mono);font-size:11px">'+esc(e.gameId||'—')+'</td>'+
        '<td>'+esc(e.gameName||'—')+'</td>'+
        '<td style="color:var(--accent3)">'+(e.deposit?fmt$(e.deposit):'—')+'</td>'+
        '<td>'+amt+'</td>'+
        '<td style="color:var(--warn)">'+(e.cashoutPaid?fmt$(e.cashoutPaid):'—')+'</td>'+
      '</tr>';
    }).join('');
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
    '<div><h2 style="font-size:17px;font-weight:800">Transaction Log</h2><div style="font-size:11px;color:var(--text3);margin-top:2px">'+allE.length+' records · Dep: '+fmt$(tD)+' · Rec: '+fmt$(tR)+' · Cashout: '+fmt$(tC)+'</div></div>'+
    '<button class="btn btn-ghost btn-sm" id="tx-clear">Clear Filters</button>'+
  '</div>'+
  '<div class="fc" style="margin-bottom:12px"><div class="filter-bar">'+
    '<input type="text" id="tx-search" placeholder="Search player, agent, ID..." value="'+esc(S.txSearch)+'" style="width:200px">'+
    '<select id="tx-type" style="width:110px"><option value="all"'+(S.txType==='all'?' selected':'')+'>All Types</option><option value="paid"'+(S.txType==='paid'?' selected':'')+'>Paid</option><option value="freeplay"'+(S.txType==='freeplay'?' selected':'')+'>Freeplay</option><option value="redeem"'+(S.txType==='redeem'?' selected':'')+'>Redeem</option></select>'+
    '<select id="tx-agent" style="width:140px"><option value="">All Agents</option>'+aOpts+'</select>'+
    '<select id="tx-game" style="width:140px"><option value="">All Games</option>'+gOpts2+'</select>'+
    '<select id="tx-shift" style="width:130px"><option value="">All Shifts</option>'+sOpts+'</select>'+
    '<input type="text" id="tx-date" placeholder="Date filter..." value="'+esc(S.txDate)+'" style="width:120px">'+
    '<select id="tx-sort" style="width:140px">'+
      '<option value="date_desc"'+(S.txSort==='date_desc'?' selected':'')+'>Newest First</option>'+
      '<option value="date_asc"'+(S.txSort==='date_asc'?' selected':'')+'>Oldest First</option>'+
      '<option value="deposit_desc"'+(S.txSort==='deposit_desc'?' selected':'')+'>Deposit ↓</option>'+
      '<option value="deposit_asc"'+(S.txSort==='deposit_asc'?' selected':'')+'>Deposit ↑</option>'+
      '<option value="player_asc"'+(S.txSort==='player_asc'?' selected':'')+'>Player A-Z</option>'+
      '<option value="agent_asc"'+(S.txSort==='agent_asc'?' selected':'')+'>Agent A-Z</option>'+
    '</select>'+
  '</div></div>'+
  '<div class="fc"><div class="tbl-wrap"><table><thead><tr><th>#</th><th>Type</th><th>Session</th><th>Date</th><th>Agent</th><th>Player</th><th>Game ID</th><th>Game</th><th>Deposit</th><th>Amount</th><th>Cashout</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

/* ───── AGENT PERFORMANCE ───── */
function buildPerformance(){
  // Collect all entries across current + closed shifts
  var allE=DB.entries.slice();
  DB.closedShifts.forEach(function(sh){(sh.entries||[]).forEach(function(e){allE.push(e);});});

  var agentList=agentNames();
  var pfDate=S.pfDate||'';
  var pfShift=S.pfShift||'';

  // Filter by date/shift if set
  var filtered=allE.slice();
  if(pfDate)filtered=filtered.filter(function(e){return(e.date||'').indexOf(pfDate)>=0;});
  if(pfShift)filtered=filtered.filter(function(e){return e.shift===pfShift;});

  // Build stats per agent
  var stats=agentList.map(function(name){
    var myE=filtered.filter(function(e){return e.agent===name;});
    var paid=myE.filter(function(e){return e.type==='paid';});
    var fp=myE.filter(function(e){return e.type==='freeplay';});
    var rd=myE.filter(function(e){return e.type==='redeem';});
    var tDep=paid.reduce(function(s,e){return s+parseFloat(e.deposit||0);},0);
    var tRec=paid.reduce(function(s,e){return s+parseFloat(e.recharge||0);},0);
    var tFP=fp.reduce(function(s,e){return s+parseFloat(e.fpAmount||0);},0);
    var tCash=rd.reduce(function(s,e){return s+parseFloat(e.cashoutPaid||0);},0);
    var newP=myE.filter(function(e){return e.isNewPlayer;}).length;
    var avgDep=paid.length?tDep/paid.length:0;
    var convRate=myE.length?(paid.length/myE.length*100).toFixed(0):0;
    // Unique players
    var players=[];myE.forEach(function(e){if(e.playerName&&players.indexOf(e.playerName)<0)players.push(e.playerName);});
    return{name:name,paidCount:paid.length,fpCount:fp.length,rdCount:rd.length,tDep:tDep,tRec:tRec,tFP:tFP,tCash:tCash,newP:newP,avgDep:avgDep,convRate:convRate,uniquePlayers:players.length,total:myE.length};
  }).filter(function(a){return a.total>0||pfDate===''&&pfShift==='';});

  // Sort by total deposit desc
  stats.sort(function(a,b){return b.tDep-a.tDep;});

  // Overall totals
  var totDep=stats.reduce(function(s,a){return s+a.tDep;},0);
  var totRec=stats.reduce(function(s,a){return s+a.tRec;},0);
  var totNew=stats.reduce(function(s,a){return s+a.newP;},0);
  var topAgent=stats.length?stats[0]:null;

  // Per-agent game breakdown
  var gameBreakdown=stats.map(function(a){
    var myPaid=filtered.filter(function(e){return e.type==='paid'&&e.agent===a.name;});
    var byGame={};
    myPaid.forEach(function(e){
      if(!byGame[e.gameName])byGame[e.gameName]={count:0,dep:0,rec:0};
      byGame[e.gameName].count++;byGame[e.gameName].dep+=parseFloat(e.deposit||0);byGame[e.gameName].rec+=parseFloat(e.recharge||0);
    });
    var gameRows=Object.keys(byGame).map(function(gn){return '<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">'+esc(gn)+'</span><span>'+byGame[gn].count+' txns · '+fmt$(byGame[gn].dep)+'</span></div>';}).join('')||'<div style="font-size:11px;color:var(--text3)">No paid recharges</div>';
    return{name:a.name,gameRows:gameRows};
  });

  var shiftOpts=shiftNames().map(function(n){return '<option value="'+esc(n)+'"'+(pfShift===n?' selected':'')+'>'+esc(n)+'</option>';}).join('');

  // Top 3 badges
  var rankBadge=function(i){return i===0?'🥇':i===1?'🥈':i===2?'🥉':'';};

  var tableRows=stats.length?stats.map(function(a,i){
    var pct=totDep>0?(a.tDep/totDep*100).toFixed(1):0;
    var barW=totDep>0?Math.round(a.tDep/totDep*100):0;
    return '<tr>'+
      '<td style="font-weight:600;white-space:nowrap">'+rankBadge(i)+' '+esc(a.name)+'</td>'+
      '<td style="font-family:var(--mono)">'+a.paidCount+'</td>'+
      '<td>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<div style="flex:1;background:var(--bg4);border-radius:4px;height:6px;min-width:60px">'+
            '<div style="width:'+barW+'%;background:var(--accent3);height:6px;border-radius:4px"></div>'+
          '</div>'+
          '<span style="font-family:var(--mono);font-size:11px;color:var(--accent3);white-space:nowrap">'+fmt$(a.tDep)+'</span>'+
          '<span style="font-size:10px;color:var(--text3)">('+pct+'%)</span>'+
        '</div>'+
      '</td>'+
      '<td style="font-family:var(--mono);color:var(--accent)">'+fmt$(a.tRec)+'</td>'+
      '<td style="font-family:var(--mono);color:var(--accent2)">'+fmt$(a.tFP)+'</td>'+
      '<td style="font-family:var(--mono);color:var(--danger)">'+fmt$(a.tCash)+'</td>'+
      '<td><span class="badge bd-green">'+a.newP+'</span></td>'+
      '<td style="font-size:11px;color:var(--text3)">'+a.uniquePlayers+'</td>'+
      '<td style="font-size:11px;color:var(--text3)">'+fmt$(a.avgDep)+'</td>'+
    '</tr>';
  }).join(''):'<tr><td colspan="9" class="empty-row">No data for this filter.</td></tr>';

  var cards=stats.slice(0,4).map(function(a,i){
    return '<div class="kpi-card" style="position:relative;overflow:hidden">'+
      '<div style="position:absolute;top:10px;right:12px;font-size:20px;opacity:.7">'+rankBadge(i)+'</div>'+
      '<div class="kpi-label">'+esc(a.name)+'</div>'+
      '<div class="kpi-value" style="color:var(--accent3);font-size:16px">'+fmt$(a.tDep)+'</div>'+
      '<div class="kpi-sub">'+a.paidCount+' recharges · '+a.newP+' new players</div>'+
    '</div>';
  }).join('');

  var gbSection=gameBreakdown.length?
    '<div class="fc" style="margin-top:16px">'+fcHead('Per-Agent Game Breakdown','var(--accent2)')+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:14px 16px">'+
      gameBreakdown.map(function(a){
        return '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px">'+
          '<div style="font-weight:700;font-size:13px;margin-bottom:8px">'+esc(a.name)+'</div>'+a.gameRows+'</div>';
      }).join('')+
    '</div></div>':'';

  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
    '<h2 style="font-size:17px;font-weight:800">Agent Performance</h2>'+
    '<div style="font-size:11px;color:var(--text3)">All shifts combined · '+filtered.length+' entries</div>'+
  '</div>'+
  // Summary KPI cards
  (cards?'<div class="akpi" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-bottom:16px">'+cards+'</div>':'')+
  // Overall totals
  '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">'+
    kCard('Total Deposits',fmt$(totDep),'all agents','var(--accent3)')+
    kCard('Total Recharges',fmt$(totRec),'all agents','var(--accent)')+
    kCard('New Players Brought',totNew,'combined','var(--warn)')+
    kCard('Agents Active',stats.filter(function(a){return a.total>0;}).length,'with entries','var(--accent2)')+
  '</div>'+
  // Filters
  '<div class="fc" style="margin-bottom:12px"><div class="filter-bar">'+
    '<input type="text" id="pf-date" placeholder="Date filter (e.g. May-2025)" value="'+esc(pfDate)+'" style="width:180px">'+
    '<select id="pf-shift" style="width:140px"><option value="">All Shifts</option>'+shiftOpts+'</select>'+
    '<button class="btn btn-ghost btn-sm" id="pf-clear-filters">Clear</button>'+
    '<button class="btn btn-ghost btn-sm" id="export-perf" style="margin-left:auto">⬇ Export CSV</button>'+
  '</div></div>'+
  // Main table
  '<div class="fc">'+fcHead('Leaderboard','var(--warn)')+
  '<div class="tbl-wrap"><table>'+
    '<thead><tr><th>Agent</th><th>Paid Txns</th><th>Total Deposit</th><th>Total Recharge</th><th>Freeplay</th><th>Cashouts</th><th>New Players</th><th>Unique Players</th><th>Avg Deposit</th></tr></thead>'+
    '<tbody>'+tableRows+'</tbody>'+
  '</table></div></div>'+
  gbSection;
}
function buildAdminAtt(){
  var people=allPeople();
  var recs=DB.attendance.slice();
  if(S.afAgent)recs=recs.filter(function(r){return r.agentName===S.afAgent;});
  if(S.afDate)recs=recs.filter(function(r){return r.date.indexOf(S.afDate)>=0;});
  if(S.afStatus==='leave')recs=recs.filter(function(r){return r.status==='leave';});
  else if(S.afStatus==='present')recs=recs.filter(function(r){return r.status!=='leave'&&r.checkIn;});
  recs.sort(function(a,b){return b.date.localeCompare(a.date);});
  var stats=people.map(function(a){
    var ar=DB.attendance.filter(function(r){return r.agentId===a.id;});
    var pres=ar.filter(function(r){return r.checkIn&&r.status!=='leave';}).length;
    var lv=ar.filter(function(r){return r.status==='leave';}).length;
    var mins=ar.filter(function(r){return r.duration;}).reduce(function(s,r){return s+r.duration;},0);
    return '<div class="kpi-card" style="padding:10px">'+
      '<div class="kpi-label" style="font-size:9px">'+esc(a.name)+'</div>'+

      '<div class="kpi-sub">'+Math.floor(mins/60)+'h '+mins%60+'m total</div>'+
    '</div>';
  }).join('');
  var aOpts=people.map(function(a){return '<option value="'+esc(a.name)+'"'+(S.afAgent===a.name?' selected':'')+'>'+esc(a.name)+'</option>';}).join('');
  var rows=recs.length?recs.map(function(r){
    var hrs=r.duration?Math.floor(r.duration/60)+'h '+r.duration%60+'m':'—';

    return '<tr>'+
      '<td style="font-weight:600">'+esc(r.agentName)+'</td>'+
      '<td style="font-size:11px;white-space:nowrap">'+esc(r.date)+'</td>'+
      '<td>'+sb+'</td>'+
      '<td style="font-family:var(--mono);font-size:11px">'+esc(r.checkIn||'—')+'</td>'+
      '<td style="font-family:var(--mono);font-size:11px">'+esc(r.checkOut||'—')+'</td>'+
      '<td style="color:var(--accent3)">'+hrs+'</td>'+
      '<td style="font-size:11px;color:var(--text3)">'+esc(r.leaveReason||'—')+'</td>'+
      '<td><button class="ibtn del" data-del-att="'+r.id+'">Del</button></td>'+
    '</tr>';
  }).join(''):'<tr><td colspan="8" class="empty-row">No records found.</td></tr>';
  return '<h2 style="font-size:17px;font-weight:800;margin-bottom:16px">Attendance Management</h2>'+
    '<div class="akpi">'+stats+'</div>'+
    '<div class="fc" style="margin-bottom:12px"><div class="filter-bar">'+

/* ───── SUPABASE ───── */
function sbHeaders(){
  var sb=DB.supabase;
  return{'apikey':sb.anonKey,'Authorization':'Bearer '+sb.anonKey,'Content-Type':'application/json','Prefer':'return=minimal'};
}
function sbUrl(table){return DB.supabase.url+'/rest/v1/'+table;}
async function sbPush(){
  var sb=DB.supabase;if(!sb.enabled||!sb.url||!sb.anonKey)return{ok:false,msg:'Not configured'};
  try{
    var allE=DB.entries.slice();DB.closedShifts.forEach(function(sh){(sh.entries||[]).forEach(function(e){allE.push(Object.assign({},e,{shift_session:sh.label||sh.date||'Closed'}));});});
    // Upsert entries
    var ePayload=allE.map(function(e){return{id:e.id,type:e.type,date:e.date,shift:e.shift,shift_session:e.shift_session||'Current',agent:e.agent||'',player_name:e.playerName||'',player_url:e.playerUrl||'',game_id:e.gameId||'',game_name:e.gameName||'',deposit:parseFloat(e.deposit||0),recharge:parseFloat(e.recharge||0),promo:parseFloat(e.promo||0),fp_amount:parseFloat(e.fpAmount||0),rd_credits:parseFloat(e.rdCredits||0),cashout_paid:parseFloat(e.cashoutPaid||0),is_new_player:!!e.isNewPlayer,cust_tag:e.custTag||'',pay_method_id:e.payMethodId||'',legal_name:e.legalName||'',contact:e.contact||'',email:e.email||''};});
    if(ePayload.length){var r1=await fetch(sbUrl('entries'),{method:'POST',headers:Object.assign({},sbHeaders(),{'Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify(ePayload)});if(!r1.ok){var t=await r1.text();return{ok:false,msg:'Entries error: '+r1.status+' '+t};}}
    // Upsert attendance
    var aPayload=DB.attendance.map(function(a){return{id:a.id,agent_id:a.agentId,agent_name:a.agentName,date:a.date,check_in:a.checkIn||null,check_out:a.checkOut||null,duration_mins:a.duration||null,status:a.status||'present',leave_reason:a.leaveReason||''};});
    if(aPayload.length){var r2=await fetch(sbUrl('attendance'),{method:'POST',headers:Object.assign({},sbHeaders(),{'Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify(aPayload)});if(!r2.ok){var t2=await r2.text();return{ok:false,msg:'Attendance error: '+r2.status+' '+t2};}}
    return{ok:true,msg:'Pushed '+ePayload.length+' entries and '+aPayload.length+' attendance records'};
  }catch(e){return{ok:false,msg:'Network error: '+e.message};}
}
async function sbPull(){
  var sb=DB.supabase;if(!sb.enabled||!sb.url||!sb.anonKey)return{ok:false,msg:'Not configured'};
  try{
    var r=await fetch(sbUrl('entries')+'?order=id',{headers:sbHeaders()});
    if(!r.ok){var t=await r.text();return{ok:false,msg:'Pull error: '+r.status+' '+t};}
    var rows=await r.json();
    if(rows&&rows.length){
      var mapped=rows.map(function(row){return{id:row.id,type:row.type,date:row.date,shift:row.shift,agent:row.agent,playerName:row.player_name,playerUrl:row.player_url,gameId:row.game_id,gameName:row.game_name,deposit:row.deposit,recharge:row.recharge,promo:row.promo,fpAmount:row.fp_amount,rdCredits:row.rd_credits,cashoutPaid:row.cashout_paid,isNewPlayer:row.is_new_player,custTag:row.cust_tag,payMethodId:row.pay_method_id,legalName:row.legal_name,contact:row.contact,email:row.email};});
      DB.entries=mapped.filter(function(e){return e.shift_session==='Current'||!e.shift_session;});
    }
    return{ok:true,msg:'Pulled '+((rows&&rows.length)||0)+' entries from Supabase'};
  }catch(e){return{ok:false,msg:'Network error: '+e.message};}
}
function buildSupabase(){
  var sb=DB.supabase;var ok=sb.enabled&&sb.url&&sb.anonKey;

/* ═══════════════════════════════════════════════════
   BIND ALL EVENTS
═══════════════════════════════════════════════════ */
function bindAll(){
  function on(id,ev,fn){var el=document.getElementById(id);if(el)el.addEventListener(ev,fn);}
  function all(sel,fn){document.querySelectorAll(sel).forEach(fn);}

  /* NAV */
  all('[data-nav]',function(el){el.addEventListener('click',function(){S.page=el.dataset.nav;render();});});
  all('[data-stab]',function(el){el.addEventListener('click',function(){S.shiftTab=el.dataset.stab;render();});});
  all('[data-ef]',function(el){el.addEventListener('click',function(){S.eFilter=el.dataset.ef;render();});});
  all('[data-asec]',function(el){el.addEventListener('click',function(){S.adminSection=el.dataset.asec;render();});});

  /* CLOSE SHIFT */
  on('btn-close-shift','click',function(){S.modal={type:'closeShift',balances:{}};render();});
  on('new-shift-btn','click',function(){DB.entries=[];DB.shiftStart=new Date().toISOString();saveDB();S.page='shift';S.shiftReport=null;S.shiftTab='paid';render();});

  /* ENTRY ACTIONS */
  all('[data-edit-entry]',function(b){b.addEventListener('click',function(){var e=DB.entries.find(function(x){return x.id===b.dataset.editEntry;});if(e){S.modal={type:'editEntry',entry:Object.assign({},e)};render();}});});
  all('[data-del-entry]',function(b){b.addEventListener('click',function(){if(confirm('Delete this entry?')){DB.entries=DB.entries.filter(function(e){return e.id!==b.dataset.delEntry;});saveDB();render();}});});

  /* GAME ACTIONS */
  on('add-game-btn','click',function(){S.modal={type:'addGame'};render();});
  all('[data-edit-game]',function(b){b.addEventListener('click',function(){S.editGameId=b.dataset.editGame;render();});});
  all('[data-cancel-game]',function(b){b.addEventListener('click',function(){S.editGameId=null;render();});});
  all('[data-del-game]',function(b){b.addEventListener('click',function(){if(confirm('Remove game?')){DB.games=DB.games.filter(function(g){return g.id!==b.dataset.delGame;});saveDB();render();}});});
  all('[data-save-game]',function(b){b.addEventListener('click',function(){
    var g=DB.games.find(function(x){return x.id===b.dataset.saveGame;});if(!g)return;
    g.name=document.getElementById('ge-name').value||g.name;
    g.vendorId=document.getElementById('ge-vendor').value||'';
    g.backendLoaded=parseFloat(document.getElementById('ge-bal').value)||g.backendLoaded;
    g.pricePer1k=parseFloat(document.getElementById('ge-price').value)||g.pricePer1k;
    g.backendLink=document.getElementById('ge-blink').value||'';
    g.playerLink=document.getElementById('ge-plink').value||'';

    pf.deposit=depEl?depEl.value:'';pf.recharge=recEl?recEl.value:'';pf.promo=pr.toFixed(2);pf.promoP=prP;
    var pe=document.getElementById('pf-promo');var ppe=document.getElementById('pf-promoP');
    if(pe)pe.value=pr.toFixed(2);if(ppe)ppe.value=prP;
  }
  if(depEl)depEl.addEventListener('input',calcPromo);if(recEl)recEl.addEventListener('input',calcPromo);
  var pmEl=document.getElementById('pf-pm');if(pmEl)pmEl.addEventListener('change',function(){pf.payMethodId=pmEl.value;pf.payTagId='';render();});
  li('pf-ptag','payTagId',pf);li('pf-ctag','custTag',pf);li('pf-gid','gameId',pf);li('pf-gname','gameName',pf);li('pf-page','pageName',pf);
  var huntEl=document.getElementById('pf-hunt');if(huntEl)huntEl.addEventListener('input',function(){pf.huntingProfile=huntEl.value;});
  li('pf-sname','salesName',pf);li('pf-lname','legalName',pf);li('pf-contact','contact',pf);li('pf-email','email',pf);
  /* Deposit on page — preserve scroll */
  function dpClick(val){return function(){pf.depositOnPage=val;var cs=document.querySelector('.content-scroll');var st=cs?cs.scrollTop:0;render();var cs2=document.querySelector('.content-scroll');if(cs2)cs2.scrollTop=st;};}
  on('dp-yes','click',dpClick('Yes'));on('dp-no','click',dpClick('No'));
  on('pf-clear','click',function(){S.pf=newPF();render();});
  on('pf-submit','click',function(){
    var f=S.pf;
    if(f.playerUrl&&!isUrl(f.playerUrl)){alert('Enter a valid Facebook URL.');return;}
    var req=[['agent','Agent'],['playerName','Player Name'],['playerUrl','Player URL'],['deposit','Deposit'],['recharge','Recharge'],['payMethodId','Payment Method'],['payTagId','Payment Tag'],['custTag','Customer Tag'],['gameId','Game ID'],['gameName','Game Name'],['depositOnPage','Deposit on Page']];
    for(var i=0;i<req.length;i++){if(!f[req[i][0]]){alert(req[i][1]+' is required.');return;}}
    if(f.depositOnPage==='Yes'&&!f.pageName){alert('Page Name required.');return;}
    if(f.depositOnPage==='No'&&!f.huntingProfile){alert('Hunting Profile required.');return;}
    var payTag=f.payTagId?tagsFor(f.payMethodId).find(function(t){return t.id===f.payTagId;}):null;
    var hasNew=!!(f.salesName||f.legalName||f.contact||f.email);
    var d=parseFloat(f.deposit)||0,r=parseFloat(f.recharge)||0;
    DB.entries.push({id:uid(),type:'paid',isNewPlayer:hasNew,date:f.date,shift:f.shift,agent:f.agent,playerName:f.playerName,playerUrl:f.playerUrl,deposit:f.deposit,recharge:f.recharge,promo:(r-d).toFixed(2),promoP:d>0?((r-d)/d*100).toFixed(1)+'%':'0%',payMethodId:f.payMethodId,payTagId:f.payTagId,payTagLabel:payTag?payTag.tag:'',custTag:f.custTag,gameId:f.gameId,gameName:f.gameName,depositOnPage:f.depositOnPage,pageName:f.pageName,huntingProfile:f.huntingProfile,salesName:f.salesName,legalName:f.legalName,contact:f.contact,email:f.email});
    S.pf=newPF();saveDB();render();
  });

  /* FREEPLAY FORM */
  var ff=S.ff;
  li('ff-date','date',ff);li('ff-shift','shift',ff);li('ff-agent','agent',ff);li('ff-pname','playerName',ff);li('ff-amt','fpAmount',ff);li('ff-gname','gameName',ff);li('ff-gid','gameId',ff);li('ff-sname','salesName',ff);li('ff-lname','legalName',ff);li('ff-contact','contact',ff);li('ff-email','email',ff);
  var fpurl=document.getElementById('ff-purl');if(fpurl)fpurl.addEventListener('blur',function(){ff.playerUrl=fpurl.value;render();});
  on('ff-clear','click',function(){S.ff=newFF();render();});
  on('ff-submit','click',function(){
    var f=S.ff;var req=[['agent','Agent'],['playerName','Player Name'],['fpAmount','Freeplay Amount'],['gameId','Game ID'],['gameName','Game Name']];
    for(var i=0;i<req.length;i++){if(!f[req[i][0]]){alert(req[i][1]+' is required.');return;}}
    var hasInfo=!!(f.salesName||f.legalName||f.contact||f.email);
    var hasPaid=DB.entries.some(function(e){return e.type==='paid'&&(e.playerName||'').toLowerCase()===(f.playerName||'').toLowerCase();});
    DB.entries.push({id:uid(),type:'freeplay',isNewPlayer:hasInfo&&hasPaid,date:f.date,shift:f.shift,agent:f.agent,playerName:f.playerName,playerUrl:f.playerUrl,fpAmount:f.fpAmount,gameId:f.gameId,gameName:f.gameName,salesName:f.salesName,legalName:f.legalName,contact:f.contact,email:f.email});
    S.ff=newFF();saveDB();render();
  });

  /* REDEEM FORM */
  var rf=S.rf;
  var gidEl=document.getElementById('rf-gid');
  if(gidEl){gidEl.addEventListener('input',function(){rf.gameId=gidEl.value;});gidEl.addEventListener('blur',function(){rf.gameId=gidEl.value;render();});}
  li('rf-shift','shift',rf);li('rf-agent','agent',rf);li('rf-date','date',rf);li('rf-gname','gameName',rf);
  var credEl=document.getElementById('rf-cred');if(credEl)credEl.addEventListener('input',function(){rf.rdCredits=credEl.value;});
  var cashEl=document.getElementById('rf-cash');if(cashEl)cashEl.addEventListener('input',function(){rf.cashoutPaid=cashEl.value;});
  on('rf-clear','click',function(){S.rf=newRF();render();});
  on('rf-submit','click',function(){
    var gidV=gidEl?gidEl.value:rf.gameId;var gnV=(document.getElementById('rf-gname')||{}).value||rf.gameName;
    var crV=credEl?credEl.value:rf.rdCredits;var caV=cashEl?cashEl.value:rf.cashoutPaid;
    var agV=(document.getElementById('rf-agent')||{}).value||rf.agent;
    var shV=(document.getElementById('rf-shift')||{}).value||rf.shift;
    var dtV=(document.getElementById('rf-date')||{}).value||rf.date;
    if(!dtV||!shV||!agV||!gidV||!gnV||!crV||!caV){alert('All fields are required.');return;}
    var match=DB.entries.find(function(e){return e.type==='paid'&&e.gameId===gidV;});
    DB.entries.push({id:uid(),type:'redeem',date:dtV,shift:shV,agent:agV,gameId:gidV,gameName:gnV,playerName:match?match.playerName:'',rdCredits:crV,cashoutPaid:caV});
    S.rf=newRF();saveDB();render();
  });
}

render();
</script>
</body>
</html>
